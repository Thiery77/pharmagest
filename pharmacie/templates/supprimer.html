<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supprimer un médicament - PharmaGest</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="card shadow-lg p-4 text-center">
            <h2 class="text-danger mb-4">⚠️ Supprimer un médicament</h2>
            <p class="lead">Voulez-vous vraiment supprimer <strong>{{ medicament.nom }}</strong> ?</p>
            <form method="POST">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Oui, supprimer</button>
                <a href="{% url 'tableau' %}" class="btn btn-secondary">Annuler</a>
            </form>
        </div>
    </div>
</body>
</html>
