<!DOCTYPE html>
<html>
<head><title>Connexion - PharmaGest</title></head>
<body>
    <div style="max-width: 400px; margin: 50px auto; padding: 20px; background: white; border-radius: 10px;">
        <h2>🔐 Connexion</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" style="padding: 10px 20px; background: #2980b9; color: white; border: none; border-radius: 4px;">Se connecter</button>
        </form>
    </div>
</body>
</html>
